<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nice (live.set) hub — Slipstream Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Reenie+Beanie&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Splash -->
  <div class="splash" id="splash">
    <div class="splash__logo">
      <img src="assets/images/nice_hub.svg" alt="nice hub" class="splash__nicehub">
      <div class="splash__liveset-wrap">
        <img src="assets/images/live_set.svg" alt="live.set" class="splash__oval">
      </div>
    </div>
    <button class="btn btn--black" id="enter-btn">
      <img src="assets/images/btn_black_default.svg" alt="" class="btn__bg btn__bg--default">
      <img src="assets/images/btn_black_hover.svg" alt="" class="btn__bg btn__bg--hover">
      <img src="assets/images/btn_black_active.svg" alt="" class="btn__bg btn__bg--active">
      <!-- Focus state -->
      <img src="assets/images/btn_black_focus.svg" alt="" class="btn__bg btn__bg--focus">
      <img src="assets/images/btn_black_focus_bk.svg" alt="" class="btn__focus-bk">
      <span class="btn__text">enter</span>
    </button>
    <p class="splash__note">
      <span class="splash__note-line">
        This is a <span class="splash__note-mark">live set<img src="assets/images/garabato-1.svg" alt="" class="splash__note-scribble"></span>
      </span>
      <span class="splash__note-line">
        Keep the <span class="splash__note-mark">tab open<img src="assets/images/garabato-2.svg" alt="" class="splash__note-scribble"></span> to keep listening.
      </span>
    </p>
  </div>

  <!-- Main App -->
  <div class="main" id="main">

    <!-- SSM Logo — top left -->
    <a href="https://soundcloud.com" target="_blank" rel="noopener" class="provider-link">
      <img src="assets/images/soundcloud.svg" alt="SoundCloud" class="provider-logo">
    </a>

    <!-- Nice Hub Logo — top center -->
    <div class="logo">
      <img src="assets/images/nice_hub.svg" alt="nice hub" class="logo__text">
      <div class="logo__liveset-wrap" id="liveset-wrap">
        <img src="assets/images/live_set.svg" alt="live.set" class="logo__liveset">
      </div>
    </div>

    <!-- Date -->
    <p class="date" id="current-date"></p>

    <!-- DJ Illustration — center -->
    <div class="dj-zone" id="dj-zone">
      <img
        class="dj-zone__illustration dj-zone__illustration--ghost"
        src="assets/images/ilustration_dj.png"
        alt=""
      >
      <video
        class="dj-zone__illustration dj-zone__illustration--ghost"
        id="dj-illustration-ghost"
        autoplay
        loop
        muted
        playsinline
      ></video>
      <video
        class="dj-zone__illustration"
        id="dj-illustration"
        autoplay
        loop
        muted
        playsinline
      ></video>
      <!-- Change DJ Button — anchored to illustration -->
      <button class="btn btn--orange" id="listen-btn">
        <img src="assets/images/btn_orange_default.svg" alt="" class="btn__bg btn__bg--default">
        <img src="assets/images/btn_orange_hover.svg" alt="" class="btn__bg btn__bg--hover">
        <img src="assets/images/btn_orange_active.svg" alt="" class="btn__bg btn__bg--active">
        <!-- Focus state -->
        <img src="assets/images/btn_orange_focus.svg" alt="" class="btn__bg btn__bg--focus">
        <img src="assets/images/btn_orange_focus_bk.svg" alt="" class="btn__focus-bk">
        <span class="btn__text">change</span>
      </button>
    </div>

    <!-- DJ Name — left of illustration -->
    <div class="dj-name-area" id="dj-name-area">
      <p class="dj-name-area__label">Dj</p>
      <p class="dj-name-area__name" id="dj-name">cooler</p>
    </div>

    <!-- Genre Tags — right of illustration -->
    <div class="genre-area" id="dj-genres">
      <span class="genre-area__tag">indie</span>
      <span class="genre-area__tag">rock</span>
      <span class="genre-area__tag">hip hop</span>
    </div>

    <!-- Album Stack — top right (queued albums) -->
    <div class="album-stack" id="album-stack">
      <a class="album-stack__card album-stack__card--1" id="stack-card-1" href="#" target="_blank" rel="noopener"></a>
      <a class="album-stack__card album-stack__card--2" id="stack-card-2" href="#" target="_blank" rel="noopener"></a>
    </div>

    <!-- Playback Zone — right side -->
    <div class="playback-zone" id="playback-zone">
      <!-- Stacked album behind (rotated) -->
      <a class="playback-zone__behind" id="album-behind" href="#" target="_blank" rel="noopener"></a>

      <!-- Current album cover -->
      <a class="playback-zone__cover" id="album-cover" href="#" target="_blank" rel="noopener"></a>

      <!-- LP Vinyl -->
      <div class="playback-zone__vinyl" id="vinyl">
        <img src="assets/images/lp.png" alt="LP" class="playback-zone__vinyl-img">
      </div>

      <!-- Illustration Set (turntable overlay — stays fixed, inline for volume fader) -->
      <svg class="illustration-set" id="illustration-set" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 296 296">
        <defs>
          <style>
            .st0 { fill: none; stroke: #000; stroke-linecap: round; stroke-width: 2px; }
          </style>

      </svg>

      <!-- Controls — mute + next (anchored to playback zone) -->
      <div class="debug-controls" id="debug-controls">
        <button class="btn btn--mute" id="debug-mute">
          <!-- type=mute (not muted, audio playing) -->
          <img src="assets/images/btn_mute_default.svg" alt="" class="btn__bg btn__bg--default btn__bg--mute-off">
          <img src="assets/images/btn_mute_hover.svg" alt="" class="btn__bg btn__bg--hover btn__bg--mute-off">
          <img src="assets/images/btn_mute_active.svg" alt="" class="btn__bg btn__bg--active btn__bg--mute-off">
          <!-- type=unmute (muted, audio silenced) -->
          <img src="assets/images/btn_unmute_default.svg" alt="" class="btn__bg btn__bg--default btn__bg--mute-on">
          <img src="assets/images/btn_unmute_hover.svg" alt="" class="btn__bg btn__bg--hover btn__bg--mute-on">
          <img src="assets/images/btn_unmute_active.svg" alt="" class="btn__bg btn__bg--active btn__bg--mute-on">
          <!-- Strikethrough line (only visible when muted) -->
          <img src="assets/images/btn_unmute_strike_default.svg" alt="" class="btn__strike btn__strike--default">
          <img src="assets/images/btn_unmute_strike_hover.svg" alt="" class="btn__strike btn__strike--hover">
          <!-- Focus state: type=mute (not muted) -->
          <img src="assets/images/btn_mute_focus.svg" alt="" class="btn__bg btn__bg--focus btn__bg--mute-off">
          <!-- Focus state: type=unmute (muted) -->
          <img src="assets/images/btn_unmute_focus.svg" alt="" class="btn__bg btn__bg--focus btn__bg--mute-on">
          <img src="assets/images/btn_unmute_strike_focus.svg" alt="" class="btn__strike btn__strike--focus">
          <!-- Focus bk (shared) -->
          <img src="assets/images/btn_mute_focus_bk.svg" alt="" class="btn__focus-bk">
          <span class="btn__text btn__text--mute">mute</span>
        </button>
        <button class="btn btn--next" id="debug-next">
          <img src="assets/images/btn_next_default.svg" alt="" class="btn__bg btn__bg--next-default">
          <img src="assets/images/btn_next_hover.svg" alt="" class="btn__bg btn__bg--next-hover">
          <img src="assets/images/btn_next_active.svg" alt="" class="btn__bg btn__bg--next-active">
          <!-- Focus state -->
          <img src="assets/images/btn_next_focus.svg" alt="" class="btn__bg btn__bg--focus">
          <img src="assets/images/btn_next_focus_bk.svg" alt="" class="btn__focus-bk">
          <span class="btn__text btn__text--next">next</span>
        </button>
      </div>
    </div>

    <!-- Left cable: SSM → DJ (behind covers) -->
    <svg class="cables cables--back" id="cables-back" xmlns="http://www.w3.org/2000/svg">
      <path id="cable-left-hit" class="cable-hit"
        fill="none" stroke="transparent" stroke-width="16" stroke-linecap="round" />
      <path id="cable-left" class="cable"
        fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" />
      <circle class="cable-plug" id="plug-provider" r="3" fill="none" stroke="#000" stroke-width="2" />
      <circle class="cable-plug" id="plug-dj-left" r="3" fill="none" stroke="#000" stroke-width="2" />
      <circle class="cable-plug" id="plug-dj-right" r="3" fill="none" stroke="#000" stroke-width="2" />
    </svg>

    <!-- Right cable: DJ → album (on top of covers/LP/illustration) -->
    <svg class="cables cables--front" id="cables-front" xmlns="http://www.w3.org/2000/svg">
      <path id="cable-right-hit" class="cable-hit"
        fill="none" stroke="transparent" stroke-width="16" stroke-linecap="round" />
      <path id="cable-right" class="cable"
        fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" />
      <circle class="cable-plug" id="plug-album" r="3" fill="none" stroke="#000" stroke-width="2" />
    </svg>

    <!-- DJ Info — bottom left -->
    <div class="dj-info">
      <img src="assets/images/arrow.svg" alt="" class="dj-info__arrow">
      <div class="dj-info__text">
        <span class="dj-info__label">dj</span>
        <span class="dj-info__name" id="footer-dj-name">cooler</span>
        <span class="dj-info__genre" id="footer-dj-genre">alternative</span>
      </div>
    </div>

    <!-- Footer — centered link -->
    <a class="footer-link" href="https://soundcloud.com" target="_blank" rel="noopener">
      soundcloud.com
    </a>

  </div>

  <!-- SoundCloud Widgets (hidden) — two iframes for gapless background playback -->
  <iframe
    id="sc-widget-a"
    allow="autoplay"
    src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com&auto_play=false"
  ></iframe>
  <iframe
    id="sc-widget-b"
    allow="autoplay"
    src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com&auto_play=false"
  ></iframe>

  <!-- GSAP + SoundCloud Widget API -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://w.soundcloud.com/player/api.js"></script>

  <!-- App scripts -->
  <script>
    // Safari supports VP9 WebM but NOT with alpha channel — use HEVC .mov there
    var _v = document.createElement('video');
    var useHEVC = _v.canPlayType('video/quicktime; codecs="hvc1"') !== '' ||
                  (_v.canPlayType('video/mp4; codecs="hvc1"') !== '' &&
                   !(/Chrome|Firefox|OPR/i.test(navigator.userAgent)));
    function animSrc(basePath) {
      return basePath.replace(/\.webm$/, useHEVC ? '.mov' : '.webm');
    }
    console.log('[anim] format:', useHEVC ? '.mov (HEVC)' : '.webm (VP9)');

    // Preload all DJ animations during splash so they're cached when needed
    ['stone-dj', 'guy-dj', 'geisha-dj', 'chicken-dj', 'general-dj'].forEach(function (name) {
      var v = document.createElement('video');
      v.preload = 'auto';
      v.muted = true;
      v.src = animSrc('assets/animation/' + name + '.webm');
      v.load();
    });
  </script>
  <script src="js/data.js"></script>
  <script src="js/player.js"></script>
  <script src="js/vinyl.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
